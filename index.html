<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catatan Order Minuman</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --accent: #4ade80;
    --accent2: #22c55e;
    --text: #f0f0f0;
    --muted: #8b8fa8;
    --input-bg: #12141e;
    --danger: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .header { text-align: center; margin-bottom: 32px; }
  .header .icon { font-size: 2.5rem; margin-bottom: 8px; display: block; }
  .header h1 {
    font-family: 'Sora', sans-serif;
    font-size: 1.6rem; font-weight: 700;
    color: var(--accent); letter-spacing: -0.5px;
  }
  .header p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

  .login-fab {
    position: fixed;
    top: 16px; right: 16px;
    width: 42px; height: 42px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    color: var(--muted);
  }
  .login-fab:hover { border-color: var(--accent); color: var(--accent); }
  .login-fab.logged { background: var(--accent); border-color: var(--accent); color: #0f1117; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px;
    max-width: 420px;
    margin: 0 auto;
  }

  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-family: 'Sora', sans-serif;
    font-size: 0.78rem; font-weight: 600;
    color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  select, input[type="date"], input[type="text"] {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 13px 14px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none; -webkit-appearance: none;
  }
  select:focus, input:focus { border-color: var(--accent); }

  .select-wrapper { position: relative; }
  .select-wrapper::after {
    content: '▾'; position: absolute;
    right: 14px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none; font-size: 1rem;
  }

  .lainnya-input { margin-top: 10px; }

  input[type="number"] {
    width: 100%; background: var(--input-bg);
    border: 1.5px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; padding: 13px 14px;
    outline: none; transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"]:focus { border-color: var(--accent); }

  .jumlah-wrapper { display: flex; align-items: center; gap: 10px; }
  .jumlah-wrapper button {
    width: 44px; height: 44px; flex-shrink: 0;
    background: var(--border); border: none; border-radius: 10px;
    color: var(--text); font-size: 1.3rem; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .jumlah-wrapper button:hover { background: var(--accent); color: #0f1117; }
  .jumlah-wrapper input { text-align: center; flex: 1; }

  .btn {
    width: 100%; padding: 15px;
    background: var(--accent); color: #0f1117;
    border: none; border-radius: 12px;
    font-family: 'Sora', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .btn:hover { background: var(--accent2); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: #0f1117;
    padding: 12px 24px; border-radius: 50px;
    font-family: 'Sora', sans-serif;
    font-size: 0.85rem; font-weight: 600;
    transition: transform 0.3s ease; z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); color: white; }

  /* ── REKAP ── */
  .rekap-wrap { max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

  /* Blok bulan */
  .bulan-block {}

  /* Header bulan */
  .bulan-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 18px;
    background: var(--accent);
    border-radius: 14px 14px 0 0;
  }
  .bulan-head .bh-label {
    font-family: 'Sora', sans-serif;
    font-size: 0.88rem; font-weight: 700; color: #0f1117;
  }
  .bulan-head .bh-total {
    font-family: 'Sora', sans-serif;
    font-size: 0.95rem; font-weight: 700; color: #0f1117;
  }

  /* Body bulan */
  .bulan-body {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 14px 14px;
    overflow: hidden;
  }

  /* Row per orang */
  .person-row {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .person-row:last-child { border-bottom: none; }
  .person-row:hover { background: var(--input-bg); }

  .person-summary {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px;
  }
  .ps-left {}
  .ps-name {
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem; font-weight: 600; color: var(--text);
  }
  .ps-meta {
    font-size: 0.78rem; color: var(--muted); margin-top: 2px;
  }
  .ps-right { text-align: right; }
  .ps-total {
    font-family: 'Sora', sans-serif;
    font-size: 0.95rem; font-weight: 700; color: var(--accent);
  }
  .ps-arr {
    font-size: 0.7rem; color: var(--muted);
    margin-top: 2px; transition: transform 0.2s;
    display: block; text-align: right;
  }
  .person-row.open .ps-arr { transform: rotate(180deg); }

  /* Detail per orang */
  .person-orders {
    display: none;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 12px;
    flex-direction: column; gap: 8px;
  }
  .person-row.open .person-orders { display: flex; }

  .order-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px;
  }
  .oc-left { flex: 1; }
  .oc-minuman { font-size: 0.88rem; font-weight: 600; color: var(--text); }
  .oc-meta { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
  .oc-jumlah {
    display: inline-block;
    background: var(--border); border-radius: 4px;
    padding: 1px 6px; font-size: 0.72rem; color: var(--text); margin-right: 4px;
  }
  .oc-right {
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    color: var(--accent); flex-shrink: 0; text-align: right;
  }
  .oc-right.dash { color: var(--muted); font-weight: 400; font-size: 0.82rem; }

  /* LOGIN */
  .login-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; padding: 24px;
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%; max-width: 340px;
    text-align: center;
  }
  .login-box .lock { font-size: 2.4rem; margin-bottom: 12px; display: block; }
  .login-box h2 {
    font-family: 'Sora', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    color: var(--text); margin-bottom: 4px;
  }
  .login-box p { font-size: 0.82rem; color: var(--muted); margin-bottom: 24px; }
  .login-box input {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem; padding: 13px 14px;
    outline: none; text-align: center;
    letter-spacing: 4px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box input::placeholder { letter-spacing: 1px; }
  .login-btn {
    width: 100%; padding: 13px;
    background: var(--accent); color: #0f1117;
    border: none; border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }
  .login-btn:hover { background: var(--accent2); }
  .login-error {
    font-size: 0.8rem; color: var(--danger);
    margin-top: 10px; display: none;
  }
  .logout-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px;
    font-size: 0.75rem; padding: 4px 10px;
    cursor: pointer; transition: all 0.2s;
    margin-left: 8px; vertical-align: middle;
  }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  .empty { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 40px 0; }
  .loading { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 40px 0; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>

<button class="login-fab" id="login-fab" onclick="bukaLogin()" title="Login">
  <svg id="fab-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="8" r="4"/>
    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
  </svg>
</button>

<div class="header">
  <span class="icon">🧋</span>
  <h1>Catatan Order Minuman</h1>
  <p>Bidang Perumahan-DPRKP Ngawi</p>
</div>



<!-- FORM -->
<div id="section-form" class="card" style="display:block">
  <div class="field">
    <label>Nama</label>
    <div class="select-wrapper">
      <select id="nama">
        <option value="">-- Pilih Nama --</option>
        <option>Bu Tiwi</option>
        <option>Bu Etiek</option>
        <option>Bu Yuni</option>
        <option>Pak Wahyudhi</option>
        <option>Mas Dika</option>
        <option>Mas Hari</option>
        <option>Mbak Reza</option>
        <option>Fauzi</option>
        <option>Aca</option>
        <option>Erma</option>
        <option>Mbak Dian</option>
        <option>Mbak Riri</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>Minuman</label>
    <div class="select-wrapper">
      <select id="minuman" onchange="cekLainnya(); updateHarga()">
        <option value="">-- Pilih Minuman --</option>
        <option data-harga="3000">Es Teh</option>
        <option data-harga="3000">Teh Hangat</option>
        <option data-harga="4000">Kopi</option>
        <option data-harga="4000">Es Jeruk</option>
        <option data-harga="4000">Jeruk Anget</option>
        <option data-harga="5000">Cappucino</option>
        <option data-harga="5000">Good Day</option>
        <option data-harga="1000">Kerupuk</option>
        <option data-harga="1000">Gorengan</option>
        <option data-harga="" value="Lainnya">Lainnya</option>
      </select>
    </div>
    <div class="lainnya-input" id="lainnya-wrap" style="display:none">
      <input type="text" id="minuman-lain" placeholder="Tulis minuman...">
    </div>
  </div>

  <div class="field" id="harga-field" style="display:none">
    <label>Harga Satuan</label>
    <div style="background:var(--input-bg);border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;font-size:0.95rem;color:var(--accent);font-weight:600;" id="harga-display"></div>
  </div>

  <div class="field">
    <label>Jumlah</label>
    <div class="jumlah-wrapper">
      <button onclick="ubahJumlah(-1)">−</button>
      <input type="number" id="jumlah" value="1" min="1" max="99">
      <button onclick="ubahJumlah(1)">+</button>
    </div>
  </div>

  <div class="field">
    <label>Tanggal Beli</label>
    <input type="date" id="tanggal">
  </div>

  <button class="btn" id="btn-submit" onclick="submitOrder()">Catat Pesanan</button>
</div>

<!-- REKAP -->
<div id="section-rekap" style="display:none;margin-top:24px">
  <div style="max-width:420px;margin:0 auto 12px;display:flex;justify-content:flex-end">
  <button onclick="exportExcel()" style="
    background:var(--card);border:1px solid var(--border);
    color:var(--accent);border-radius:10px;
    padding:9px 16px;font-family:'Sora',sans-serif;
    font-size:0.78rem;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:7px;transition:all 0.2s;
  " onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export Excel
  </button>
</div>
<div id="rekap-root" class="rekap-wrap">
    <div class="loading">Memuat data...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="login-overlay" style="display:none">
  <div class="login-box">
    <span class="lock" id="lock-icon">🔒</span>
    <h2 id="login-title">Akses Rekap</h2>
    <p id="login-desc">Masukkan password untuk melihat rekap</p>
    <div id="login-form-wrap">
      <div style="position:relative;margin-bottom:0">
        <input type="password" id="login-input" placeholder="Password..." onkeydown="if(event.key==='Enter')doLogin()" style="padding-right:46px;margin-bottom:0">
        <button onclick="togglePw()" type="button" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;align-items:center;" id="pw-toggle">
          <svg id="pw-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button class="login-btn" onclick="doLogin()" style="margin-top:14px">Masuk</button>
      <div class="login-error" id="login-error">❌ Password salah</div>
    </div>
    <div id="logout-wrap" style="display:none">
      <button class="login-btn" style="background:var(--danger);color:white" onclick="doLogout()">Keluar</button>
    </div>
    <button onclick="tutupLogin()" style="background:none;border:none;color:var(--muted);font-size:0.82rem;margin-top:14px;cursor:pointer;">Tutup</button>
  </div>
</div>

<script>
  const PASSWORD = "dprkp2026";
  let isLoggedIn = false;

  function togglePw() {
    const input = document.getElementById('login-input');
    const eye = document.getElementById('pw-eye');
    if (input.type === 'password') {
      input.type = 'text';
      eye.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      eye.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  function doLogin() {
    const val = document.getElementById('login-input').value;
    const err = document.getElementById('login-error');
    if (val === PASSWORD) {
      isLoggedIn = true;
      document.getElementById('login-input').value = '';
      err.style.display = 'none';
      document.getElementById('login-fab').classList.add('logged');
      document.getElementById('fab-icon').innerHTML = '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>';
      document.getElementById('section-rekap').style.display = 'block';
      tutupLogin();
      loadRekap();
    } else {
      err.style.display = 'block';
      document.getElementById('login-input').value = '';
      document.getElementById('login-input').focus();
    }
  }

  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzTWqt-W_aE85P4fezj0iIfBiSxK42s5Rg1nzCKD0GD-qpAqHO0lj3Nhgftr8fDAuWW/exec";
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('tanggal').value = today;

  let allData = null;

  const HARGA_MAP = {
    'Es Teh': 3000, 'Teh Hangat': 3000, 'Kopi': 4000,
    'Es Jeruk': 4000, 'Jeruk Anget': 4000,
    'Cappucino': 5000, 'Good Day': 5000, 'Kerupuk': 1000, 'Gorengan': 1000,
  };

  const BULAN_NAMES = ['Januari','Februari','Maret','April','Mei','Juni',
                       'Juli','Agustus','September','Oktober','November','Desember'];

  function rp(n) {
    return n ? 'Rp ' + Number(n).toLocaleString('id-ID') : '-';
  }

  function bukaLogin() {
    const overlay = document.getElementById('login-overlay');
    overlay.style.display = 'flex';
    if (isLoggedIn) {
      document.getElementById('login-form-wrap').style.display = 'none';
      document.getElementById('logout-wrap').style.display = 'block';
      document.getElementById('lock-icon').textContent = '🔓';
      document.getElementById('login-title').textContent = 'Sudah Login';
      document.getElementById('login-desc').textContent = 'Kamu bisa melihat rekap di bawah';
    } else {
      document.getElementById('login-form-wrap').style.display = 'block';
      document.getElementById('logout-wrap').style.display = 'none';
      document.getElementById('lock-icon').textContent = '🔒';
      document.getElementById('login-title').textContent = 'Akses Rekap';
      document.getElementById('login-desc').textContent = 'Masukkan password untuk melihat rekap';
      setTimeout(() => document.getElementById('login-input').focus(), 100);
    }
  }

  function tutupLogin() {
    document.getElementById('login-overlay').style.display = 'none';
  }

  function doLogout() {
    isLoggedIn = false;
    document.getElementById('rekap-root').innerHTML = '';
    document.getElementById('section-rekap').style.display = 'none';
    document.getElementById('login-fab').classList.remove('logged');
    document.getElementById('fab-icon').innerHTML = '<circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>';
    allData = null;
    tutupLogin();
  }

function updateHarga() {
    document.getElementById('harga-field').style.display = 'none';
  }

  function ubahJumlah(delta) {
    const el = document.getElementById('jumlah');
    el.value = Math.max(1, (parseInt(el.value)||1) + delta);
  }

  function cekLainnya() {
    const val = document.getElementById('minuman').value;
    document.getElementById('lainnya-wrap').style.display = val==='Lainnya' ? 'block' : 'none';
  }

  function showToast(msg, error=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (error ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function submitOrder() {
    const nama = document.getElementById('nama').value;
    const minumanSelect = document.getElementById('minuman').value;
    const minumanLain = document.getElementById('minuman-lain').value.trim();
    const tanggal = document.getElementById('tanggal').value;
    const jumlah = parseInt(document.getElementById('jumlah').value) || 1;
    const minuman = minumanSelect === 'Lainnya' ? minumanLain : minumanSelect;
    const harga = HARGA_MAP[minuman] || '';
    const total = harga ? harga * jumlah : '';

    if (!nama || !minuman || !tanggal) {
      showToast('⚠️ Lengkapi semua field dulu', true); return;
    }

    const btn = document.getElementById('btn-submit');
    btn.disabled = true; btn.textContent = 'Mengirim...';
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tanggal, nama, minuman, jumlah, harga, total })
      });
      showToast('✅ Order berhasil dikirim!');
      ['nama','minuman','minuman-lain','tanggal'].forEach(id => document.getElementById(id).value = id==='tanggal'?today:'');
      document.getElementById('jumlah').value = '1';
      document.getElementById('lainnya-wrap').style.display = 'none';
      document.getElementById('harga-field').style.display = 'none';
      allData = null;
    } catch(e) { showToast('❌ Gagal kirim, coba lagi', true); }
    btn.disabled = false; btn.textContent = 'Catat Pesanan';
  }

  async function loadRekap() {
    if (allData) { renderRekap(); return; }
    document.getElementById('rekap-root').innerHTML = '<div class="loading">Memuat data...</div>';
    try {
      const res = await fetch(SCRIPT_URL);
      allData = await res.json();
      renderRekap();
    } catch(e) {
      document.getElementById('rekap-root').innerHTML = '<div class="empty">Gagal memuat data</div>';
    }
  }

  function renderRekap() {
    if (!allData || allData.length === 0) {
      document.getElementById('rekap-root').innerHTML = '<div class="empty">Belum ada data order</div>';
      return;
    }

    // Kelompokkan per bulan
    const perBulan = {};
    allData.forEach(row => {
      if (!row['Tanggal']) return;
      const d = new Date(row['Tanggal']);
      if (isNaN(d)) return;
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (!perBulan[key]) perBulan[key] = [];
      perBulan[key].push(row);
    });

    const bulanKeys = Object.keys(perBulan).sort().reverse();

    const html = bulanKeys.map(key => {
      const [y, m] = key.split('-');
      const label = `${BULAN_NAMES[parseInt(m)-1]} ${y}`;
      const rows = perBulan[key];

      // Kelompokkan per orang dalam bulan ini
      const perOrang = {};
      let grandTotal = 0;
      rows.forEach(row => {
        const nama = row['Nama'] || '?';
        if (!perOrang[nama]) perOrang[nama] = { total: 0, orders: [] };
        const tot = Number(row['Total']) || 0;
        perOrang[nama].total += tot;
        perOrang[nama].orders.push(row);
        grandTotal += tot;
      });

      const sortedOrang = Object.entries(perOrang).sort((a,b) => b[1].total - a[1].total);

      const personRows = sortedOrang.map(([nama, data], idx) => {
        const pid = `p-${key}-${idx}`;
        const totalOrders = data.orders.length;
        const totalItem = data.orders.reduce((s,r) => s + (Number(r['Jumlah'])||1), 0);

        const orderItems = [...data.orders].reverse().map(row => {
          const d2 = new Date(row['Tanggal']);
          const tgl = d2.toLocaleDateString('id-ID', { day:'numeric', month:'short' });
          const jml = Number(row['Jumlah']) || 1;
          const tot = Number(row['Total']);
          return `<div class="order-card">
            <div class="oc-left">
              <div class="oc-minuman">🧋 ${row['Minuman']||'-'}</div>
              <div class="oc-meta">
                ${jml > 1 ? `<span class="oc-jumlah">✕${jml}</span>` : ''}
                📅 ${tgl}
              </div>
            </div>
            <div class="oc-right ${!tot?'dash':''}">${tot ? rp(tot) : '-'}</div>
          </div>`;
        }).join('');

        return `<div class="person-row" id="${pid}" onclick="togglePerson('${pid}')">
          <div class="person-summary">
            <div class="ps-left">
              <div class="ps-name">${nama}</div>
              <div class="ps-meta">${totalOrders} order · ${totalItem} item</div>
            </div>
            <div class="ps-right">
              <div class="ps-total">${data.total > 0 ? rp(data.total) : '-'}</div>
              <span class="ps-arr">▾</span>
            </div>
          </div>
          <div class="person-orders">${orderItems}</div>
        </div>`;
      }).join('');

      return `<div class="bulan-block">
        <div class="bulan-head">
          <span class="bh-label">📅 ${label}</span>
          <span class="bh-total">${grandTotal > 0 ? rp(grandTotal) : '-'}</span>
        </div>
        <div class="bulan-body">${personRows}</div>
      </div>`;
    }).join('');

    document.getElementById('rekap-root').innerHTML = html;
  }

  function exportExcel() {
    if (!allData || allData.length === 0) {
      showToast('Belum ada data', true); return;
    }

    // Susun data
    const rows = [['Tanggal', 'Nama', 'Minuman', 'Jumlah', 'Harga', 'Total']];
    allData.forEach(r => {
      rows.push([
        r['Tanggal'] || '',
        r['Nama'] || '',
        r['Minuman'] || '',
        r['Jumlah'] || '',
        r['Harga'] || '',
        r['Total'] || ''
      ]);
    });

    // Buat CSV dengan BOM agar Excel bisa baca karakter Indonesia
    const bom = '﻿';
    const csv = bom + rows.map(row =>
      row.map(val => {
        const s = String(val);
        return s.includes(',') || s.includes('"') || s.includes('\n')
          ? '"' + s.replace(/"/g, '""') + '"'
          : s;
      }).join(',')
    ).join('\n');

    // Download
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const now = new Date();
    const tgl = now.toISOString().slice(0,10).replace(/-/g,'');
    a.href = url;
    a.download = `rekap-minuman-${tgl}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ File berhasil diunduh!');
  }

  function togglePerson(pid) {
    document.getElementById(pid).classList.toggle('open');
  }
</script>
</body>
</html>
