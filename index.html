<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catatan Order Minuman</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --accent: #4ade80;
    --accent2: #22c55e;
    --text: #f0f0f0;
    --muted: #8b8fa8;
    --input-bg: #12141e;
    --danger: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .header { text-align: center; margin-bottom: 32px; }
  .header .icon { font-size: 2.5rem; margin-bottom: 8px; display: block; }
  .header h1 {
    font-family: 'Sora', sans-serif;
    font-size: 1.6rem; font-weight: 700;
    color: var(--accent); letter-spacing: -0.5px;
  }
  .header p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

  .tabs {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    max-width: 420px;
    margin: 0 auto 28px;
  }
  .tab {
    flex: 1; padding: 10px; text-align: center;
    font-family: 'Sora', sans-serif;
    font-size: 0.82rem; font-weight: 600;
    border-radius: 9px; cursor: pointer;
    color: var(--muted); transition: all 0.2s;
  }
  .tab.active { background: var(--accent); color: #0f1117; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px;
    max-width: 420px;
    margin: 0 auto;
  }

  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-family: 'Sora', sans-serif;
    font-size: 0.78rem; font-weight: 600;
    color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  select, input[type="date"], input[type="text"] {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 13px 14px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none; -webkit-appearance: none;
  }
  select:focus, input:focus { border-color: var(--accent); }

  .select-wrapper { position: relative; }
  .select-wrapper::after {
    content: '▾'; position: absolute;
    right: 14px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none; font-size: 1rem;
  }

  .lainnya-input { margin-top: 10px; }

  input[type="number"] {
    width: 100%; background: var(--input-bg);
    border: 1.5px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; padding: 13px 14px;
    outline: none; transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"]:focus { border-color: var(--accent); }

  .jumlah-wrapper { display: flex; align-items: center; gap: 10px; }
  .jumlah-wrapper button {
    width: 44px; height: 44px; flex-shrink: 0;
    background: var(--border); border: none; border-radius: 10px;
    color: var(--text); font-size: 1.3rem; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .jumlah-wrapper button:hover { background: var(--accent); color: #0f1117; }
  .jumlah-wrapper input { text-align: center; flex: 1; }

  .btn {
    width: 100%; padding: 15px;
    background: var(--accent); color: #0f1117;
    border: none; border-radius: 12px;
    font-family: 'Sora', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .btn:hover { background: var(--accent2); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: #0f1117;
    padding: 12px 24px; border-radius: 50px;
    font-family: 'Sora', sans-serif;
    font-size: 0.85rem; font-weight: 600;
    transition: transform 0.3s ease; z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); color: white; }

  /* ── REKAP ── */
  .rekap-wrap { max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

  /* Blok bulan */
  .bulan-block {}

  /* Header bulan */
  .bulan-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 18px;
    background: var(--accent);
    border-radius: 14px 14px 0 0;
  }
  .bulan-head .bh-label {
    font-family: 'Sora', sans-serif;
    font-size: 0.88rem; font-weight: 700; color: #0f1117;
  }
  .bulan-head .bh-total {
    font-family: 'Sora', sans-serif;
    font-size: 0.95rem; font-weight: 700; color: #0f1117;
  }

  /* Body bulan */
  .bulan-body {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 14px 14px;
    overflow: hidden;
  }

  /* Row per orang */
  .person-row {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .person-row:last-child { border-bottom: none; }
  .person-row:hover { background: var(--input-bg); }

  .person-summary {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px;
  }
  .ps-left {}
  .ps-name {
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem; font-weight: 600; color: var(--text);
  }
  .ps-meta {
    font-size: 0.78rem; color: var(--muted); margin-top: 2px;
  }
  .ps-right { text-align: right; }
  .ps-total {
    font-family: 'Sora', sans-serif;
    font-size: 0.95rem; font-weight: 700; color: var(--accent);
  }
  .ps-arr {
    font-size: 0.7rem; color: var(--muted);
    margin-top: 2px; transition: transform 0.2s;
    display: block; text-align: right;
  }
  .person-row.open .ps-arr { transform: rotate(180deg); }

  /* Detail per orang */
  .person-orders {
    display: none;
    background: var(--input-bg);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    flex-direction: column; gap: 8px;
  }
  .person-row.open .person-orders { display: flex; }

  .order-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    font-size: 0.82rem;
  }
  .order-left { color: var(--muted); flex: 1; }
  .order-left strong { color: var(--text); font-weight: 500; }
  .order-right { color: var(--accent); font-weight: 600; flex-shrink: 0; margin-left: 8px; }
  .order-right.dash { color: var(--muted); font-weight: 400; }

  .empty { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 40px 0; }
  .loading { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 40px 0; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>

<div class="header">
  <span class="icon">🧋</span>
  <h1>Catatan Order Minuman</h1>
  <p>Bidang Perumahan-DPRKP Ngawi</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('form')">📝 Order</div>
  <div class="tab" onclick="switchTab('rekap')">📋 Rekap</div>
</div>

<!-- FORM -->
<div id="section-form" class="card">
  <div class="field">
    <label>Nama</label>
    <div class="select-wrapper">
      <select id="nama">
        <option value="">-- Pilih Nama --</option>
        <option>Bu Tiwi</option>
        <option>Bu Etiek</option>
        <option>Bu Yuni</option>
        <option>Pak Wahyudhi</option>
        <option>Mas Dika</option>
        <option>Mas Hari</option>
        <option>Mbak Reza</option>
        <option>Fauzi</option>
        <option>Aca</option>
        <option>Erma</option>
        <option>Mbak Dian</option>
        <option>Mbak Riri</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>Minuman</label>
    <div class="select-wrapper">
      <select id="minuman" onchange="cekLainnya(); updateHarga()">
        <option value="">-- Pilih Minuman --</option>
        <option data-harga="3000">Es Teh</option>
        <option data-harga="3000">Teh Anget</option>
        <option data-harga="4000">Kopi</option>
        <option data-harga="4000">Es Jeruk</option>
        <option data-harga="4000">Jeruk Anget</option>
        <option data-harga="5000">Cappucino</option>
        <option data-harga="5000">Good Day</option>
        <option data-harga="1000">Kerupuk</option>
        <option data-harga="" value="Lainnya">Lainnya</option>
      </select>
    </div>
    <div class="lainnya-input" id="lainnya-wrap" style="display:none">
      <input type="text" id="minuman-lain" placeholder="Tulis minuman...">
    </div>
  </div>

  <div class="field" id="harga-field" style="display:none">
    <label>Harga Satuan</label>
    <div style="background:var(--input-bg);border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;font-size:0.95rem;color:var(--accent);font-weight:600;" id="harga-display"></div>
  </div>

  <div class="field">
    <label>Jumlah</label>
    <div class="jumlah-wrapper">
      <button onclick="ubahJumlah(-1)">−</button>
      <input type="number" id="jumlah" value="1" min="1" max="99">
      <button onclick="ubahJumlah(1)">+</button>
    </div>
  </div>

  <div class="field">
    <label>Tanggal Beli</label>
    <input type="date" id="tanggal">
  </div>

  <button class="btn" id="btn-submit" onclick="submitOrder()">Catat Pesanan</button>
</div>

<!-- REKAP -->
<div id="section-rekap" style="display:none">
  <div id="rekap-root" class="rekap-wrap">
    <div class="loading">Memuat data...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzTWqt-W_aE85P4fezj0iIfBiSxK42s5Rg1nzCKD0GD-qpAqHO0lj3Nhgftr8fDAuWW/exec";
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('tanggal').value = today;

  let allData = null;

  const HARGA_MAP = {
    'Es Teh': 3000, 'Teh Anget': 3000, 'Kopi': 4000,
    'Es Jeruk': 4000, 'Jeruk Anget': 4000,
    'Cappucino': 5000, 'Good Day': 5000, 'Kerupuk': 1000
  };

  const BULAN_NAMES = ['Januari','Februari','Maret','April','Mei','Juni',
                       'Juli','Agustus','September','Oktober','November','Desember'];

  function rp(n) {
    return n ? 'Rp ' + Number(n).toLocaleString('id-ID') : '-';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i===0&&tab==='form')||(i===1&&tab==='rekap'));
    });
    document.getElementById('section-form').style.display = tab==='form' ? 'block' : 'none';
    document.getElementById('section-rekap').style.display = tab==='rekap' ? 'block' : 'none';
    if (tab === 'rekap') loadRekap();
  }

  function updateHarga() {
    const val = document.getElementById('minuman').value;
    const field = document.getElementById('harga-field');
    const disp  = document.getElementById('harga-display');
    if (val && val !== 'Lainnya' && HARGA_MAP[val]) {
      field.style.display = 'block';
      disp.textContent = rp(HARGA_MAP[val]);
    } else {
      field.style.display = 'none';
    }
  }

  function ubahJumlah(delta) {
    const el = document.getElementById('jumlah');
    el.value = Math.max(1, (parseInt(el.value)||1) + delta);
  }

  function cekLainnya() {
    const val = document.getElementById('minuman').value;
    document.getElementById('lainnya-wrap').style.display = val==='Lainnya' ? 'block' : 'none';
  }

  function showToast(msg, error=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (error ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function submitOrder() {
    const nama = document.getElementById('nama').value;
    const minumanSelect = document.getElementById('minuman').value;
    const minumanLain = document.getElementById('minuman-lain').value.trim();
    const tanggal = document.getElementById('tanggal').value;
    const jumlah = parseInt(document.getElementById('jumlah').value) || 1;
    const minuman = minumanSelect === 'Lainnya' ? minumanLain : minumanSelect;
    const harga = HARGA_MAP[minuman] || '';
    const total = harga ? harga * jumlah : '';

    if (!nama || !minuman || !tanggal) {
      showToast('⚠️ Lengkapi semua field dulu', true); return;
    }

    const btn = document.getElementById('btn-submit');
    btn.disabled = true; btn.textContent = 'Mengirim...';
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tanggal, nama, minuman, jumlah, harga, total })
      });
      showToast('✅ Order berhasil dikirim!');
      ['nama','minuman','minuman-lain','tanggal'].forEach(id => document.getElementById(id).value = id==='tanggal'?today:'');
      document.getElementById('jumlah').value = '1';
      document.getElementById('lainnya-wrap').style.display = 'none';
      document.getElementById('harga-field').style.display = 'none';
      allData = null;
    } catch(e) { showToast('❌ Gagal kirim, coba lagi', true); }
    btn.disabled = false; btn.textContent = 'Catat Pesanan';
  }

  async function loadRekap() {
    if (allData) { renderRekap(); return; }
    document.getElementById('rekap-root').innerHTML = '<div class="loading">Memuat data...</div>';
    try {
      const res = await fetch(SCRIPT_URL);
      allData = await res.json();
      renderRekap();
    } catch(e) {
      document.getElementById('rekap-root').innerHTML = '<div class="empty">Gagal memuat data</div>';
    }
  }

  function renderRekap() {
    if (!allData || allData.length === 0) {
      document.getElementById('rekap-root').innerHTML = '<div class="empty">Belum ada data order</div>';
      return;
    }

    // Kelompokkan per bulan
    const perBulan = {};
    allData.forEach(row => {
      if (!row['Tanggal']) return;
      const d = new Date(row['Tanggal']);
      if (isNaN(d)) return;
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (!perBulan[key]) perBulan[key] = [];
      perBulan[key].push(row);
    });

    const bulanKeys = Object.keys(perBulan).sort().reverse();

    const html = bulanKeys.map(key => {
      const [y, m] = key.split('-');
      const label = `${BULAN_NAMES[parseInt(m)-1]} ${y}`;
      const rows = perBulan[key];

      // Kelompokkan per orang dalam bulan ini
      const perOrang = {};
      let grandTotal = 0;
      rows.forEach(row => {
        const nama = row['Nama'] || '?';
        if (!perOrang[nama]) perOrang[nama] = { total: 0, orders: [] };
        const tot = Number(row['Total']) || 0;
        perOrang[nama].total += tot;
        perOrang[nama].orders.push(row);
        grandTotal += tot;
      });

      const sortedOrang = Object.entries(perOrang).sort((a,b) => b[1].total - a[1].total);

      const personRows = sortedOrang.map(([nama, data], idx) => {
        const pid = `p-${key}-${idx}`;
        const totalOrders = data.orders.length;
        const totalItem = data.orders.reduce((s,r) => s + (Number(r['Jumlah'])||1), 0);

        const orderItems = [...data.orders].reverse().map(row => {
          const d2 = new Date(row['Tanggal']);
          const tgl = d2.toLocaleDateString('id-ID', { day:'numeric', month:'short' });
          const jml = Number(row['Jumlah']) || 1;
          const tot = Number(row['Total']);
          return `<div class="order-row">
            <div class="order-left">
              <strong>${row['Minuman']||'-'}</strong>
              ${jml > 1 ? ` ✕${jml}` : ''} &nbsp;·&nbsp; ${tgl}
            </div>
            <div class="order-right ${!tot?'dash':''}">${tot ? rp(tot) : '-'}</div>
          </div>`;
        }).join('');

        return `<div class="person-row" id="${pid}" onclick="togglePerson('${pid}')">
          <div class="person-summary">
            <div class="ps-left">
              <div class="ps-name">${nama}</div>
              <div class="ps-meta">${totalOrders} order · ${totalItem} item</div>
            </div>
            <div class="ps-right">
              <div class="ps-total">${data.total > 0 ? rp(data.total) : '-'}</div>
              <span class="ps-arr">▾</span>
            </div>
          </div>
          <div class="person-orders">${orderItems}</div>
        </div>`;
      }).join('');

      return `<div class="bulan-block">
        <div class="bulan-head">
          <span class="bh-label">📅 ${label}</span>
          <span class="bh-total">${grandTotal > 0 ? rp(grandTotal) : '-'}</span>
        </div>
        <div class="bulan-body">${personRows}</div>
      </div>`;
    }).join('');

    document.getElementById('rekap-root').innerHTML = html;
  }

  function togglePerson(pid) {
    document.getElementById(pid).classList.toggle('open');
  }
</script>
</body>
</html>
